<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PackMusic · Mindscape</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      color: white;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 20;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
    }
    #info h1 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin: 0;
      background: linear-gradient(135deg, #fff, #a678ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #controls {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: 20px;
      background: rgba(20,25,45,0.7);
      backdrop-filter: blur(20px);
      padding: 20px 40px;
      border-radius: 80px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .ctrl-btn:hover {
      background: #a678ff;
      transform: scale(1.1);
      border-color: #a678ff;
    }
    #play-pause {
      background: #4a40bf;
      width: 80px;
      height: 80px;
      font-size: 36px;
    }
    #play-pause:hover {
      background: #6a5aff;
    }
    #environment-select {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      color: white;
      padding: 0 20px;
      font-size: 16px;
      cursor: pointer;
      outline: none;
      backdrop-filter: blur(10px);
      min-width: 150px;
    }
    #thoughts-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 40;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s;
      max-width: 600px;
      width: 80%;
    }
    #thoughts-panel.visible {
      opacity: 1;
    }
    #thought-text {
      font-size: 2rem;
      font-weight: 300;
      line-height: 1.5;
      text-shadow: 0 0 30px rgba(166,120,255,0.5);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 80px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #playlist {
      position: absolute;
      right: 30px;
      top: 100px;
      z-index: 25;
      width: 280px;
      background: rgba(20,25,45,0.7);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      max-height: 60vh;
      overflow-y: auto;
    }
    #playlist h3 {
      margin: 0 0 15px 10px;
      font-weight: 400;
      color: #b1b9d9;
      letter-spacing: 2px;
    }
    .playlist-item {
      padding: 12px 20px;
      margin: 5px 0;
      border-radius: 30px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .playlist-item:hover {
      background: rgba(255,255,255,0.1);
      border-color: #a678ff;
    }
    .playlist-item.active {
      background: #4a40bf40;
      border-color: #a678ff;
    }
    #track-info {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 35;
      text-align: center;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      padding: 12px 30px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #track-title {
      font-size: 1.4rem;
      margin-bottom: 5px;
    }
    #track-artist {
      font-size: 1rem;
      color: #b1b9d9;
    }
    #volume-control {
      position: absolute;
      left: 30px;
      bottom: 100px;
      z-index: 30;
      writing-mode: bt-lr;
      -webkit-appearance: slider-vertical;
      width: 20px;
      height: 150px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    @media (max-width: 800px) {
      #controls { flex-wrap: wrap; width: 90%; padding: 15px; bottom: 20px; }
      #playlist { right: 10px; width: 220px; }
      #thought-text { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div id="info">
    <h1>♢ PACKMUSIC · MINDSCAPE</h1>
  </div>

  <div id="playlist">
    <h3>IMMERSIVE PLAYLIST</h3>
    <ul id="playlist-items" style="list-style: none; padding: 0;"></ul>
  </div>

  <div id="track-info">
    <div id="track-title">Select a song</div>
    <div id="track-artist">from the beyond</div>
  </div>

  <div id="thoughts-panel">
    <div id="thought-text">Breathe. Let the music carry you inward.</div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="prev">⏮</button>
    <button class="ctrl-btn" id="play-pause">▶</button>
    <button class="ctrl-btn" id="next">⏭</button>
    <select id="environment-select">
      <option value="space">🌌 Space</option>
      <option value="underwater">🌊 Underwater</option>
      <option value="forest">🌲 Forest</option>
      <option value="cathedral">⛪ Cathedral</option>
      <option value="mindscape" selected>🧠 Mindscape</option>
    </select>
  </div>

  <input type="range" id="volume-control" min="0" max="100" value="70" orient="vertical">

  <!-- Three.js container -->
  <div id="canvas-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function() {
      // ---------- Three.js Setup ----------
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0c14);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 30;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.getElementById('canvas-container').appendChild(renderer.domElement);

      // Lights
      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);
      const pointLight = new THREE.PointLight(0xa678ff, 1, 50);
      pointLight.position.set(0, 0, 20);
      scene.add(pointLight);

      // Particle system
      const particleCount = 4000;
      const particles = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      for (let i = 0; i < particleCount; i++) {
        const r = 20 + Math.random() * 30;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i*3+2] = r * Math.cos(phi);

        const color = new THREE.Color().setHSL(0.7 + Math.random()*0.2, 0.8, 0.5 + Math.random()*0.3);
        colors[i*3] = color.r;
        colors[i*3+1] = color.g;
        colors[i*3+2] = color.b;
      }
      particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const particleMaterial = new THREE.PointsMaterial({ 
        size: 0.25, 
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.8
      });
      const particleSystem = new THREE.Points(particles, particleMaterial);
      scene.add(particleSystem);

      // Central glow
      const glowGeometry = new THREE.SphereGeometry(1, 32, 32);
      const glowMaterial = new THREE.MeshBasicMaterial({ color: 0xa678ff, emissive: 0x442288 });
      const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
      scene.add(glowSphere);

      // Floating orbs (environment indicators)
      const orbGroup = new THREE.Group();
      const orbMat = new THREE.MeshStandardMaterial({ color: 0xa678ff, emissive: 0x331166 });
      for (let i = 0; i < 5; i++) {
        const orb = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16), orbMat);
        orb.position.set(Math.sin(i*1.2)*8, Math.cos(i*1.2)*8, Math.sin(i*0.5)*5);
        orbGroup.add(orb);
      }
      scene.add(orbGroup);

      // Mouse interaction
      let mouseX = 0, mouseY = 0;
      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
      });

      // ---------- Web Audio Setup ----------
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();

      // Resume on interaction
      document.body.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }, { once: true });

      // Audio element
      const audio = new Audio();
      audio.crossOrigin = 'anonymous';
      audio.loop = false;

      // Create source and effects
      const source = audioCtx.createMediaElementSource(audio);
      const gainNode = audioCtx.createGain();
      const reverbNode = audioCtx.createConvolver();
      const reverbGain = audioCtx.createGain();
      const dryGain = audioCtx.createGain();
      dryGain.gain.value = 0.5;
      const wetGain = audioCtx.createGain();
      wetGain.gain.value = 0.5;

      // Binaural beat generator (Mindscape)
      const oscLeft = audioCtx.createOscillator();
      const oscRight = audioCtx.createOscillator();
      const gainOsc = audioCtx.createGain();
      oscLeft.frequency.value = 100;
      oscRight.frequency.value = 104; // 4 Hz difference
      oscLeft.type = 'sine';
      oscRight.type = 'sine';
      gainOsc.gain.value = 0;

      const merger = audioCtx.createChannelMerger(2);
      oscLeft.connect(merger, 0, 0);
      oscRight.connect(merger, 0, 1);
      merger.connect(gainOsc);
      gainOsc.connect(audioCtx.destination);

      oscLeft.start();
      oscRight.start();

      // Connect main graph
      source.connect(dryGain);
      dryGain.connect(gainNode);
      source.connect(reverbNode);
      reverbNode.connect(wetGain);
      wetGain.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      // Visualizer analyser
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      source.connect(analyser);

      // Impulse responses for environments
      function createImpulse(duration, decay) {
        const sampleRate = audioCtx.sampleRate;
        const length = sampleRate * duration;
        const impulse = audioCtx.createBuffer(2, length, sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const data = impulse.getChannelData(ch);
          for (let i = 0; i < length; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sampleRate * decay));
          }
        }
        return impulse;
      }

      const envs = {
        space: { ir: createImpulse(3.0, 0.5), color: 0x331166, bg: 0x0a0c14 },
        underwater: { ir: createImpulse(1.5, 1.2), color: 0x115566, bg: 0x112233 },
        forest: { ir: createImpulse(1.2, 0.8), color: 0x226622, bg: 0x1a2a1a },
        cathedral: { ir: createImpulse(4.0, 2.0), color: 0x884422, bg: 0x2a1a0a },
        mindscape: { ir: createImpulse(5.0, 2.5), color: 0x551188, bg: 0x1a0a2a }
      };

      // UI Elements
      const playPauseBtn = document.getElementById('play-pause');
      const prevBtn = document.getElementById('prev');
      const nextBtn = document.getElementById('next');
      const envSelect = document.getElementById('environment-select');
      const volumeSlider = document.getElementById('volume-control');
      const trackTitle = document.getElementById('track-title');
      const trackArtist = document.getElementById('track-artist');
      const playlistEl = document.getElementById('playlist-items');
      const thoughtsPanel = document.getElementById('thoughts-panel');
      const thoughtText = document.getElementById('thought-text');

      // State
      let playlist = [];
      let currentIndex = 0;
      let isPlaying = false;

      // Thoughts quotes
      const quotes = [
        "Breathe. Let the music carry you inward.",
        "Feel the vibration of every cell.",
        "You are the universe experiencing itself.",
        "Thoughts are clouds; let them pass.",
        "In the silence, you find yourself.",
        "This moment is all there is.",
        "Sound is the medicine.",
        "Drift deeper into your own mind."
      ];
      let quoteInterval;

      // Environment change
      function setEnvironment(envKey) {
        const env = envs[envKey];
        reverbNode.buffer = env.ir;
        wetGain.gain.value = 0.6;
        dryGain.gain.value = 0.5;
        scene.background.setHex(env.bg);
        particleMaterial.color.setHex(env.color);
        if (envKey === 'mindscape') {
          gainOsc.gain.value = 0.02; // subtle binaural beat
          thoughtsPanel.classList.add('visible');
          // Rotate quotes
          if (quoteInterval) clearInterval(quoteInterval);
          quoteInterval = setInterval(() => {
            thoughtText.textContent = quotes[Math.floor(Math.random() * quotes.length)];
          }, 8000);
        } else {
          gainOsc.gain.value = 0;
          thoughtsPanel.classList.remove('visible');
          if (quoteInterval) clearInterval(quoteInterval);
        }
      }

      envSelect.addEventListener('change', (e) => setEnvironment(e.target.value));

      // Load playlist from GitHub
      async function loadPlaylist() {
        const apiUrl = 'https://api.github.com/repos/sussybocca/PackArcade/contents/public/audio';
        try {
          const res = await fetch(apiUrl);
          if (!res.ok) throw new Error('GitHub fetch failed');
          const data = await res.json();
          const mp3Files = data.filter(f => f.name.toLowerCase().endsWith('.mp3'));
          playlist = mp3Files.map(f => ({
            name: f.name.replace(/\.mp3$/i, ''),
            url: `https://raw.githubusercontent.com/sussybocca/PackArcade/main/public/audio/${encodeURIComponent(f.name)}`
          }));
          playlistEl.innerHTML = '';
          playlist.forEach((track, idx) => {
            const li = document.createElement('li');
            li.className = 'playlist-item';
            li.textContent = track.name;
            li.addEventListener('click', () => {
              loadTrack(idx);
              if (!isPlaying) {
                audio.play().catch(e => console.warn(e));
                playPauseBtn.textContent = '⏸';
                isPlaying = true;
              }
            });
            playlistEl.appendChild(li);
          });
          if (playlist.length) loadTrack(0);
        } catch (e) {
          console.error('Playlist error', e);
          playlistEl.innerHTML = '<li class="playlist-item">Error loading songs</li>';
        }
      }

      function loadTrack(index) {
        if (index < 0) index = playlist.length - 1;
        if (index >= playlist.length) index = 0;
        currentIndex = index;
        const track = playlist[currentIndex];
        if (!track) return;
        audio.src = track.url;
        audio.load();
        trackTitle.textContent = track.name;
        trackArtist.textContent = 'PackArcade';
        document.querySelectorAll('.playlist-item').forEach((li, i) => {
          if (i === currentIndex) li.classList.add('active');
          else li.classList.remove('active');
        });
        if (isPlaying) audio.play().catch(e => console.warn(e));
      }

      // Play/Pause
      playPauseBtn.addEventListener('click', () => {
        if (!playlist.length) return;
        if (isPlaying) {
          audio.pause();
          playPauseBtn.textContent = '▶';
        } else {
          audio.play().catch(e => console.warn(e));
          playPauseBtn.textContent = '⏸';
        }
        isPlaying = !isPlaying;
      });

      // Next/Prev
      nextBtn.addEventListener('click', () => {
        if (!playlist.length) return;
        loadTrack(currentIndex + 1);
        if (isPlaying) audio.play().catch(e => console.warn(e));
      });
      prevBtn.addEventListener('click', () => {
        if (!playlist.length) return;
        loadTrack(currentIndex - 1);
        if (isPlaying) audio.play().catch(e => console.warn(e));
      });

      // Volume
      volumeSlider.addEventListener('input', (e) => {
        gainNode.gain.value = e.target.value / 100;
      });
      gainNode.gain.value = 0.7;

      // Auto next
      audio.addEventListener('ended', () => {
        loadTrack(currentIndex + 1);
        if (isPlaying) audio.play().catch(e => console.warn(e));
      });

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);

        // Rotate particles slowly
        particleSystem.rotation.y += 0.0002;
        particleSystem.rotation.x += 0.0001;

        // Move camera slightly with mouse
        camera.position.x += (mouseX * 10 - camera.position.x) * 0.02;
        camera.position.y += (mouseY * 5 - camera.position.y) * 0.02;
        camera.lookAt(0, 0, 0);

        // Pulse central sphere with audio
        if (analyser) {
          analyser.getByteFrequencyData(dataArray);
          const avg = dataArray.reduce((a, b) => a + b, 0) / bufferLength;
          const scale = 1 + avg / 200;
          glowSphere.scale.set(scale, scale, scale);
        }

        renderer.render(scene, camera);
      }
      animate();

      // Handle resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Start
      loadPlaylist();
      setEnvironment('mindscape'); // default
    })();
  </script>
</body>
</html>
